<!DOCTYPE html>

    <style>
        body {
            background: #000000;
            color: #32cd32; /* Hulk Yeşili */
        }
        
        .hulk-header {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.alphacoders.com/100/1001416.jpg');
            background-size: cover;
            background-position: center;
            padding: 120px 0;
            border-bottom: 5px solid #32cd32;
        }

        .hulk-card {
            background: #111;
            border: 1px solid #32cd32;
            transition: 0.4s;
            cursor: pointer;
        }

        .hulk-card:hover {
            box-shadow: 0 0 30px #32cd32;
            transform: scale(1.02);
        }

        .vtec-text {
            font-family: 'Impact', sans-serif;
            letter-spacing: 4px;
            text-shadow: 3px 3px #000;
        }

        .navbar {
            background-color: #000 !important;
            border-bottom: 2px solid #32cd32;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-success" href="ramazan.html">🟢 HULK RAMAZAN</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="ramazan.html">Ana Sayfa</a>

        </div>

    </div>
</header>

<div class="container my-5">

        <div class="col-md-6 col-lg-4">
            <div class="card hulk-card" data-bs-toggle="modal" data-bs-target="#hulkModal" onclick="showImg(this)">
                <img src="img/kurşunaders.jpg" class="card-img-top" style="height:250px; object-fit:cover;" alt="Hulk Ön">

        </div>
        <div class="col-md-6 col-lg-4">

        <div class="col-md-6 col-lg-4">
            <div class="card hulk-card" data-bs-toggle="modal" data-bs-target="#hulkModal" onclick="showImg(this)">

                <div class="card-body p-2 text-center"><small>Tokat Sokaklarında Bir Gece</small></div>
            </div>
        </div>
        </div>
</div>

<div class="modal fade" id="hulkModal" tabindex="-1" aria-hidden="true">

        <div class="modal-content bg-black border-success">
            <div class="modal-header border-success">
                <h5 class="modal-title text-success fw-bold">HULK RAMAZAN ÖZEL</h5>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function showImg(element) {
        const src = element.querySelector('img').getAttribute('src');
        document.getElementById('modalImg').src = src;
    }
</script>
